<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Transaction History</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="icon" type="image/x-icon" href="favicon.ico">
        <link rel="stylesheet" type="text/css" href="assets/css/customer.css">
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    </head>
    <body class="bg-light">
        <div id="navbar-placeholder"></div>

        <div class="container mt-5">
            <div class="row mb-4 align-items-center">
                <div class="col-md-6">
                    <h2 class="fw-bold text-primary mb-0">Transaction History</h2>
                    <p class="text-muted">Track all your financial activities in one place.</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <button class="btn btn-outline-primary shadow-sm me-2">
                        <i class="bi bi-download me-1"></i> Export PDF
                    </button>
                    <button class="btn btn-primary shadow-sm" onclick="window.location.href = 'money-transfer.html'">
                        <i class="bi bi-plus-lg me-1"></i> New Transfer
                    </button>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-3">
                    <form class="row g-3" onsubmit="filterTransactions(event)">
                        <div class="col-md-4">
                            <input type="text" name ="toAccount" class="form-control border-2" placeholder="Search by IBAN or Description...">
                        </div>
                        <div class="col-md-3">
                            <select class="form-select border-2" name="type">
                                <option value="ALL" >All Transactions</option>
                                <option value="OUTGOING">Sent(Outgoing)</option> 
                                <option value="INCOMING">Received (Incoming)</option>   
                                <option value="INTERNAL">Received (Internal)</option>

                            </select>
                        </div>
                        <div class="col-md-3">
                            <input type="date" name="date" class="form-control border-2">                
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-dark w-100 fw-bold">Filter</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-primary text-white">
                                <tr>
                                    <th class="ps-4 py-3">Date</th>
                                    <th class="py-3">Recipient/Sender</th>
                                    <th class="py-3">Description</th>
                                    <th class="py-3">Type</th>
                                    <th class="py-3 text-end pe-4">Amount</th>
                                </tr>
                            </thead>
                            <tbody id="listTbody"> </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const token = localStorage.getItem("MBtoken");
                if (!token) {
                    window.location.href = "login.html";
                    return;
                }
                includeNavbar();
                filterTransactions();
            });
            function includeNavbar() {
                fetch("navbar.html")
                        .then(response => response.text())
                        .then(data => {
                            document.getElementById("navbar-placeholder").innerHTML = data;
                        })
                        .catch(err => console.error("Navbar can't included!", err));
            }
            function filterTransactions(event) {
                const token = localStorage.getItem("MBtoken");
                if (event) {
                    event.preventDefault();
                }
                const keyword = document.querySelector(`input[name="toAccount"]`).value;
                const type = document.querySelector(`select[name="type"]`).value;
                const date = document.querySelector(`input[name="date"]`).value;
                const params = new URLSearchParams();
                if (keyword && keyword.trim() !== "") {
                    params.append("keyword", keyword);
                }
                if (type && type.trim() !== "ALL") {
                    params.append("type", type);
                }
                if (date) {
                    params.append("date", date);
                }
                const apiUrl = `http://localhost:8080/minibankrest/transaction-history?${params.toString()}`;
                fetch(apiUrl, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    }})
                        .then(response => {
                            if (response.status === 401 || response.status === 403) {
                                localStorage.removeItem("MBtoken");
                                window.location.href = "login.html";
                                return;
                            }
                            if (!response.ok) {
                                throw new Error("transaction can't loaded!");
                            }
                            return response.json();
                        }).then(data => {
                    const filteredList = data.obj.filteredList;
                    const listTbody = document.getElementById("listTbody");
                    listTbody.innerHTML = "";
                    if (!filteredList || filteredList.length === 0) {
                        listTbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="text-center py-5">
                                <img src="https://cdn-icons-png.flaticon.com/512/4076/4076402.png" width="80" class="opacity-25 mb-3"><br>
                                <span class="text-muted">No transactions found for the selected period.</span>
                            </td>
                        </tr>`;
                        return;
                    }
                    filteredList.forEach(t => {
                        const bodyTr = document.createElement("tr");
                        const isOutgoingArrow = t.transactionType === 'OUTGOING' ? 'bi-arrow-down-right text-danger'
                                : t.transactionType === 'INTERNAL' ? 'bi-arrow-repeat text-primary'
                                : 'bi-arrow-up-left text-success';
                        const isOutgoingText = t.transactionType === 'OUTGOING' ? 'bg-danger-subtle text-danger'
                                : t.transactionType === 'INTERNAL' ? 'bg-primary-subtle text-primary'
                                : 'bg-success-subtle text-success';
                        const isOutgoing = t.transactionType === 'OUTGOING' ? 'text-danger'
                                : t.transactionType === 'INTERNAL' ? 'text-primary'
                                : 'text-success';
                        const isOutgoingPlus = t.transactionType === 'OUTGOING' ? 'bi bi-dash text-danger'
                                : t.transactionType === 'INTERNAL' ? 'bi bi-dash text-primary fw-bold'
                                : 'bi bi-plus"';
                        bodyTr.innerHTML = `<td class="ps-4 text-muted small">
                                        ${t.formattedDate}
                                    </td>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="rounded-circle bg-light p-2 me-3">
                                                <i class="bi ${isOutgoingArrow}"></i>
                                            </div>
                                            <div>
                                                <span class="fw-bold d-block">${t.toIban}</span>
                                                <span class="text-muted extra-small" style="font-size: 0.75rem;">Ref: #${t.id}</span>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="text-dark">${t.description}</span>
                                    </td>
                                    <td>
                                        <span class="badge ${isOutgoingText} rounded-pill px-3">
                                            ${t.transactionType}
                                        </span>
                                    </td>
                                    <td class="text-end pe-4 fw-bold fs-5 ${isOutgoingPlus}">
                                        ${t.amount} ₼
                                </td></tr>`;
                        listTbody.appendChild(bodyTr);
                    });
                }).catch(err => console.error("Transaction History Error", err));
            }
        </script>
    </body>
</html>
