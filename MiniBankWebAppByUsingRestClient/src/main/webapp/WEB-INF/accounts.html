<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<div class="container mt-4">
    <div class="row align-items-center mb-5">
        <div class="col-lg-8">
            <h2 class="fw-bold text-dark mb-1">My Accounts</h2>
            <p class="text-muted">Welcome back! Here is an overview of your finances.</p>
            <a href="/open-new-account" 
               class="btn btn-success btn-sm shadow-sm rounded-pill px-3">
                + Open New Account
            </a>
        </div>
        <div class="col-lg-4 mt-3 mt-lg-0">
            <div class="card bg-primary text-white border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-body p-4 position-relative">
                    <p class="mb-1 small opacity-75 text-uppercase fw-bold">Total Net Worth</p>
                    <h2 class="fw-bold mb-0">~ 100 ?</h2>
                    <div class="mt-2">
                        <span class="badge bg-white bg-opacity-25 rounded-pill small">
                            <span class="spinner-grow spinner-grow-sm me-1" role="status"></span>
                            Live Balance
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <hr class="mb-5 opacity-10">

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100 border-start border-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <h6 class="text-muted">
                            CheckingAccount 
                        </h6>
                        <span class="bg-primary-subtle text-primary rounded-pill">Active</span>
                    </div>
                    <h3 class="mt-2 mb-3 fw-bold">balance ?</h3>
                    <p class="card-text text-muted small">Account No: id</p>

                    <div class="d-grid mt-3">
                        <a href="/accounts/{id}" class="btn btn-sm ">Details</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-5 mb-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-0 pt-3">
                <h5 class="fw-bold">Recent Activity</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-muted">
                            <tr>
                                <th class="ps-4">Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th class="text-end pe-4">Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="ps-4 text-muted">Mar 12, 2026</td>
                                <td class="fw-semibold">Grocery Store - Bravo</td>
                                <td><span class="badge bg-warning-subtle text-warning">Shopping</span></td>
                                <td class="text-end pe-4 text-danger fw-bold">- 45.20 ?</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
