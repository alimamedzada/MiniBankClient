<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>MiniBank - Customer Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </head>
    <body class="bg-light">

        <div id="navbar-placeholder"></div>

        <div class="container py-4">

            <div class="welcome-banner text-center mb-5">
                <h1 class="display-4 fw-bold">Welcome back, <span id="customerName" class="text-primary">Loading...</span>!</h1>
                <p class="lead">Here is an overview of your financial world.</p>
            </div>

            <div class="row row-cols-1 row-cols-md-2 g-4">

                <div class="col">
                    <div class="card h-100 p-3 text-center shadow-sm">
                        <div class="card-body">
                            <i class="bi bi-wallet2 fs-1 text-primary"></i> 
                            <h3 class="card-title mt-2">My Accounts</h3>
                            <p class="card-text text-muted">Total Balance</p>
                            <h2 class="fw-bold my-3 text-success" id="totalBalance">0.00 ₼</h2>
                            <button class="btn btn-outline-primary w-100">View Accounts</button>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card h-100 p-3 shadow-sm">
                        <div class="card-body text-center">
                            <i class="bi bi-clock-history fs-1 text-secondary"></i> 
                            <h3 class="card-title mt-2">Recent History</h3>
                            <ul class="list-group list-group-flush text-start small mt-3" id="transactionList">
                                <li class="list-group-item text-center text-muted">Loading transactions...</li>
                            </ul>
                        </div>
                    </div>
                </div>

            </div> 
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                includeNavbar();
                fetchCustomerData();
            });
            function includeNavbar() {
                fetch('navbar.html')
                        .then(response => response.text())
                        .then(data => {
                            document.getElementById('navbar-placeholder').innerHTML = data;
                        })
                        .catch(err => console.error("Navbar yüklenemedi:", err));
            }
            document.addEventListener("DOMContentLoaded", function () {
                fetchCustomerData();
            });
            function fetchCustomerData() {
                const apiUrl = 'http://localhost:8080/minibankrest/customer';
                fetch(apiUrl)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error("Network response was not ok");
                            }
                            return response.json();
                        })
                        .then(data => {
                            const customerData = data.obj;
                            document.getElementById('customerName').innerText = customerData.customer.name;
                            document.getElementById('totalBalance').innerText = customerData.totalBalance + " ₼";
                            renderTransactions(customerData.transactions);
                        })
                        .catch(error => {
                            console.error("Veri çekilirken hata oluştu:", error);
                            document.getElementById('customerName').innerText = "Error!";
                            document.getElementById('totalBalance').innerText = "Error!";
                        });
            }

            function renderTransactions(transactions) {
                const listContainer = document.getElementById('transactionList');
                listContainer.innerHTML = ''; // Önceki "Loading..." yazısını temizle
                if (!transactions || transactions.length === 0) {
                    listContainer.innerHTML = '<li class="list-group-item text-center">No recent transactions.</li>';
                    return;
                }
                transactions.forEach(t => {
                    const isOutgoing = t.transactionType === 'OUTGOING';
                    const colorClass = isOutgoing ? 'text-danger' : 'text-success';
                    const sign = isOutgoing ? '-' : '+';
                    const li = document.createElement('li');
                    li.className = "list-group-item d-flex justify-content-between align-items-center py-2";
                    li.innerHTML = `
                        <div>
                            <div class="fw-bold text-dark">${t.description}</div>
                            <small class="text-muted">${t.transactionType}</small>
                        </div>
                        <div class="text-end fw-bold ${colorClass}">
                            ${sign}${t.amount} ₼
                        </div>
                    `;
                    listContainer.appendChild(li);
                });
            }
        </script>
    </body>
</html>
